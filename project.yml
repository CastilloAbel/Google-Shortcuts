# XcodeGen Project Specification
# Genera .xcodeproj sin necesidad de Xcode para diseñar
# Uso: xcodegen generate (en macOS)

name: GoogleShortcuts
options:
  bundleIdPrefix: com.abel
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.abel.googleshortcuts
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""

targets:
  GoogleShortcuts:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GoogleShortcuts
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abel.googleshortcuts
        INFOPLIST_FILE: GoogleShortcuts/App/Info.plist
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: GoogleShortcuts
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: GoogleShortcuts/App/GoogleShortcuts.entitlements
    info:
      path: GoogleShortcuts/App/Info.plist
    postCompileScripts: []

schemes:
  GoogleShortcuts:
    build:
      targets:
        GoogleShortcuts: all
    run:
      config: Debug
    archive:
      config: Release
