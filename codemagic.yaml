workflows:
  google-shortcuts-build:
    name: Build GoogleShortcuts IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: "com.abel.googleshortcuts"
        APP_NAME: "GoogleShortcuts"
      groups:
        - google_secrets
    scripts:
      - name: Install XcodeGen
        script: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Inject secrets
        script: |
          cd $CM_BUILD_DIR
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            /usr/libexec/PlistBuddy -c "Add :GOOGLE_CLIENT_ID string ${GOOGLE_CLIENT_ID}" \
              GoogleShortcuts/App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GOOGLE_CLIENT_ID ${GOOGLE_CLIENT_ID}" \
              GoogleShortcuts/App/Info.plist
            echo "✅ Client ID injected"
          else
            echo "⚠️ GOOGLE_CLIENT_ID not set, skipping injection"
          fi

      - name: Generate Xcode Project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
          echo "✅ Xcode project generated"

      - name: Build archive
        script: |
          cd $CM_BUILD_DIR
          xcodebuild archive \
            -project GoogleShortcuts.xcodeproj \
            -scheme GoogleShortcuts \
            -destination "generic/platform=iOS" \
            -archivePath $CM_BUILD_DIR/build/GoogleShortcuts.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            | xcpretty || true
          
          if [ -d "$CM_BUILD_DIR/build/GoogleShortcuts.xcarchive" ]; then
            echo "✅ Archive created successfully"
          else
            echo "❌ Archive FAILED"
            exit 1
          fi

      - name: Create unsigned IPA
        script: |
          APP_PATH=$(find $CM_BUILD_DIR/build/GoogleShortcuts.xcarchive -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found in archive"
            find $CM_BUILD_DIR/build/GoogleShortcuts.xcarchive -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -r "$APP_PATH" $CM_BUILD_DIR/build/Payload/
          
          cd $CM_BUILD_DIR/build
          zip -r GoogleShortcuts-unsigned.ipa Payload/
          
          echo "✅ IPA created: $(du -h GoogleShortcuts-unsigned.ipa | cut -f1)"

    artifacts:
      - build/*.ipa

    publishing:
      email:
        recipients:
          - castillokev.abel@gmail.com
        notify:
          success: true
          failure: true